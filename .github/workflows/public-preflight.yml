name: Public Preflight

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv sync --extra test
          find . -path './.venv' -prune -o -name requirements.txt -print \
            | sort \
            | xargs cat \
            | sed '/^$/d' \
            | sort -u > /tmp/ksadk-sample-requirements.txt
          uv pip install -r /tmp/ksadk-sample-requirements.txt

      - name: Run public preflight
        run: make public-preflight
